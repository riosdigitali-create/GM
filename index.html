<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archipiélago PRU - Entrenamiento Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pru-blue: #001e60; 
            --pru-light-blue: #0055a5;
            --ocean-bg: #e0f2fe; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Dark background outside mobile container */
            color: #1e293b;
            margin: 0;
            overscroll-behavior-y: none;
            user-select: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }

        #app-container {
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            margin: 0 auto;
            background-color: var(--ocean-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-3d {
            border-bottom-width: 4px;
            transition: transform 0.1s cubic-bezier(0, 0, 0.2, 1), border-bottom-width 0.1s;
        }
        .btn-3d:active:not(:disabled) {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        .btn-3d:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-bottom-width: 0px;
            transform: translateY(4px);
        }

        .quiz-opt {
            border: 2px solid #cbd5e1;
            border-bottom-width: 4px;
            transition: all 0.15s ease;
            border-radius: 1rem;
            cursor: pointer;
            background-color: #ffffff;
        }
        .quiz-opt:hover:not(.disabled) {
            background-color: #f8fafc;
        }
        .quiz-opt.selected {
            border-color: #3b82f6; 
            background-color: #eff6ff;
            color: #1d4ed8;
        }
        .quiz-opt.disabled {
            opacity: 0.5;
            pointer-events: none;
            background-color: #f1f5f9;
            border-color: #e2e8f0;
        }
        .quiz-opt.correct {
            border-color: #22c55e;
            background-color: #f0fdf4;
            color: #166534;
        }
        .quiz-opt:active:not(.selected):not(.disabled) {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        .bounce { animation: bounce-anim 2s infinite ease-in-out; }
        @keyframes bounce-anim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .float { animation: float-anim 3s infinite ease-in-out; }
        @keyframes float-anim {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .island-node {
            width: 100px;
            height: 100px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), inset 0 -5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .island-node.locked {
            background: #cbd5e1 !important;
            filter: grayscale(100%);
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.05);
        }

        .path-dashed {
            position: absolute;
            width: 4px;
            border-left: 4px dashed #94a3b8;
            z-index: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .tech-pill {
            display: inline-block;
            padding: 4px 10px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            color: #475569;
            margin-right: 6px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Modal Styles */
        #custom-modal { transition: opacity 0.2s; }
        .modal-content { transition: transform 0.2s; }
    </style>
</head>
<body>

<div id="app-container">

    <!-- MAP SCREEN -->
    <div id="screen-map" class="flex flex-col w-full h-full bg-[#0284c7] relative overflow-hidden">
        <!-- Decoraciones de agua -->
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #ffffff 2px, transparent 2px); background-size: 40px 40px;"></div>
        
        <div class="h-16 flex items-center justify-between px-5 sticky top-0 z-30 bg-[#0c4a6e]/90 backdrop-blur-md border-b border-[#0ea5e9]/30">
            <div class="flex items-center gap-2">
                <span class="font-black text-white text-lg tracking-wider">ARCHIPIÉLAGO PRU</span>
            </div>
            <div class="flex items-center gap-2 bg-[#0284c7] px-3 py-1.5 rounded-lg border border-[#38bdf8]">
                <span class="text-xl">🎓</span> <span id="xp-counter" class="font-bold text-white">0</span>
            </div>
        </div>

        <div id="map-content" class="flex-1 hide-scroll overflow-y-auto relative pb-32 pt-12 flex flex-col items-center">
            <div id="path-bg" class="path-dashed top-12 bottom-32"></div>
            <div id="nodes-container" class="w-full flex flex-col items-center z-10 gap-12"></div>
        </div>

        <div class="h-16 flex justify-around items-center px-2 sticky bottom-0 z-30 bg-white border-t border-slate-200">
            <button class="flex flex-col items-center w-1/3 text-[#0284c7]">
                <span class="text-2xl mb-0.5">🏝️</span>
                <span class="text-[10px] font-black uppercase">Islas</span>
            </button>
            <button class="flex flex-col items-center w-1/3 text-slate-400 hover:text-slate-600" onclick="showModal('Cotizador', 'El simulador de cotizaciones se desbloqueará al dominar todas las islas.')">
                <span class="text-2xl mb-0.5">💻</span>
                <span class="text-[10px] font-black uppercase">Cotizar</span>
            </button>
            <button class="flex flex-col items-center w-1/3 text-slate-400 hover:text-slate-600" onclick="showModal('Métricas', 'Tu tablero de rendimiento técnico está en construcción.')">
                <span class="text-2xl mb-0.5">📊</span>
                <span class="text-[10px] font-black uppercase">Progreso</span>
            </button>
        </div>
    </div>

    <!-- LESSON SCREEN -->
    <div id="screen-lesson" class="hidden flex-col w-full h-full bg-slate-50 relative z-40">
        <div class="h-14 flex items-center px-4 gap-4 sticky top-0 bg-white z-20 border-b border-slate-200 shadow-sm">
            <button onclick="exitLesson()" class="text-slate-400 hover:text-slate-600 font-bold text-2xl pb-1">✕</button>
            <div class="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                <div id="lesson-progress" class="h-full bg-blue-500 w-0 transition-all duration-500 rounded-full"></div>
            </div>
            <div class="text-slate-500 font-bold text-xs tracking-widest w-8 text-right">
                <span id="lesson-current-step">0</span>/<span id="lesson-total-steps">0</span>
            </div>
        </div>

        <div id="lesson-content" class="flex-1 hide-scroll overflow-y-auto p-5 pb-40">
            <!-- Content injected here -->
        </div>

        <div id="lesson-footer" class="absolute bottom-0 w-full p-4 bg-white border-t border-slate-200 z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <div id="lesson-feedback" class="hidden mb-3">
                <div class="flex items-start gap-3">
                    <div id="feedback-icon" class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl shrink-0"></div>
                    <div>
                        <h2 id="feedback-title" class="font-black text-lg leading-tight"></h2>
                        <p id="feedback-text" class="text-[14px] text-slate-700 mt-1 font-medium"></p>
                    </div>
                </div>
            </div>
            <button id="lesson-btn" onclick="handleLessonAction()" class="w-full py-4 rounded-xl font-black text-[16px] btn-3d uppercase tracking-wide">
                CONTINUAR
            </button>
        </div>
    </div>

    <!-- COMPLETION SCREEN -->
    <div id="screen-completion" class="hidden absolute inset-0 bg-slate-900 z-50 flex-col items-center justify-center p-6 text-center">
        <div class="text-8xl mb-6 bounce">🏴‍☠️</div>
        <h1 class="text-3xl font-black text-white mb-2 uppercase tracking-wide">Isla Conquistada</h1>
        <p id="completion-text" class="text-slate-300 font-medium mb-8 text-base px-4">Has dominado todas las reglas técnicas de este producto.</p>
        
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 mb-10 w-full max-w-[280px]">
            <p class="text-slate-400 font-bold uppercase text-[11px] tracking-widest mb-1">Recompensa</p>
            <p class="text-2xl font-black text-[#38bdf8]">+50 EXP</p>
        </div>

        <button onclick="finishLesson()" class="w-full max-w-[280px] py-4 rounded-xl font-black text-[16px] btn-3d bg-[#0284c7] border-[#0369a1] text-white uppercase tracking-wide">
            Navegar a la siguiente
        </button>
    </div>

    <!-- CUSTOM MODAL -->
    <div id="custom-modal" class="hidden fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 pointer-events-none">
        <div class="modal-content bg-white rounded-2xl w-full max-w-[320px] p-6 text-center transform scale-95 shadow-2xl">
            <div class="text-4xl mb-3">🚧</div>
            <h3 id="modal-title" class="font-black text-xl text-slate-800 mb-2"></h3>
            <p id="modal-desc" class="text-slate-600 font-medium text-sm mb-6"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold rounded-xl transition-colors">
                Entendido
            </button>
        </div>
    </div>

</div>

<script>
    const islands = [
        {
            id: "i1", title: "Isla Bienestar", subtitle: "Protección Pura Temporal", color: "bg-[#38bdf8]", icon: "☂️",
            lessons: [
                {
                    type: "info", title: "Ficha Técnica: Bienestar",
                    dialogue: "Bienvenido a la Isla Bienestar. Aquí solo hay protección pura, sin ahorros. Grábate estos datos:",
                    content: [
                        { tag: "PAGO ÚNICO", text: "Si ocurre el siniestro, entrega la Suma Asegurada en <b>una sola exhibición</b>." },
                        { tag: "PLAZOS", text: "Múltiplos de 5 (10, 15, 20, 25, 30 años) o edad alcanzada (55, 60, 65, 70)." },
                        { tag: "SUMA MÍNIMA", text: "<b>150,000 UDIS</b> o 5,000 Dólares." },
                        { tag: "REGLA DE ORO", text: "Prohibido cotizar el plazo de 5 años. Prohibido cotizar en pesos." }
                    ]
                },
                {
                    type: "quiz", question: "¿Cuál es la Suma Asegurada Básica Mínima para emitir un Bienestar en UDIS?",
                    options: [
                        { text: "50,000 UDIS", hint: "Ese es el mínimo del plan Garantía." },
                        { text: "150,000 UDIS", correct: true },
                        { text: "75,000 UDIS", hint: "Ese es el piso recomendado para el plan Vida." }
                    ],
                    feedback: "Correcto. 150k UDIS es el piso técnico para Bienestar."
                },
                {
                    type: "quiz", question: "Un cliente te pide un Bienestar a 5 años exactos. ¿Qué le respondes?",
                    options: [
                        { text: "Claro, se lo cotizo de inmediato.", hint: "Recuerda la Regla de Oro sobre las prohibiciones operativas." },
                        { text: "Le explico que el mínimo permitido operativamente es de 10 años.", correct: true }
                    ],
                    feedback: "Exacto. El plazo de 5 años está bloqueado para metas de ventas."
                },
                {
                    type: "summary", title: "Lo que debes recordar",
                    bullets: [
                        "Bienestar = Cheque gordo en pago único.",
                        "Mínimo 10 años, prohibido 5 años.",
                        "Mínimo 150,000 UDIS.",
                        "No genera valor de rescate (ahorro)."
                    ]
                }
            ]
        },
        {
            id: "i2", title: "Isla Respaldo", subtitle: "Sustitución de Ingresos", color: "bg-[#818cf8]", icon: "🗓️",
            lessons: [
                {
                    type: "info", title: "Ficha Técnica: Respaldo",
                    dialogue: "Navegamos a la Isla Respaldo. Este producto no da cheques grandes, da nóminas.",
                    content: [
                        { tag: "RENTAS", text: "Liquida la suma en <b>Rentas Mensuales</b> a los beneficiarios hasta terminar el plazo." },
                        { tag: "PLAZOS", text: "De <b>15 a 30 años</b>. Ojo: Aquí NO existe el plazo de 10 años." },
                        { tag: "SUMA MÍNIMA", text: "<b>1,650 UDIS</b> mensuales o 600 USD mensuales." },
                        { tag: "EXCLUSIONES", text: "Este plan <b>NO ACEPTA</b> coberturas de Muerte Accidental ni Pérdidas Orgánicas." }
                    ]
                },
                {
                    type: "quiz", question: "¿Qué coberturas adicionales están estrictamente EXCLUIDAS en el producto Respaldo?",
                    options: [
                        { text: "Muerte Accidental y Pérdidas Orgánicas", correct: true },
                        { text: "Invalidez Total y Permanente", hint: "La invalidez SÍ se puede contratar en Respaldo." },
                        { text: "Enfermedades Graves y Cirugías", hint: "Los complementos de salud SÍ son permitidos." }
                    ],
                    feedback: "Correcto. Al ser pago de rentas, excluye estas indemnizaciones de accidente (pago único)."
                },
                {
                    type: "quiz", question: "¿Cuál es el plazo MÍNIMO de contratación que permite el sistema para el plan Respaldo?",
                    options: [
                        { text: "10 años", hint: "Recuerda que el Respaldo empieza en un plazo mayor que el Bienestar." },
                        { text: "15 años", correct: true }
                    ],
                    feedback: "Exacto. En Respaldo no hay plazos de 10 años."
                },
                {
                    type: "summary", title: "Lo que debes recordar",
                    bullets: [
                        "Respaldo = Rentas mensuales (Nómina).",
                        "Plazo mínimo arranca en 15 años.",
                        "Mínimo de 1,650 UDIS al mes.",
                        "NO acepta Muerte Accidental."
                    ]
                }
            ]
        },
        {
            id: "i3", title: "Isla Premium", subtitle: "Devolución y Supervivencia", color: "bg-[#fb7185]", icon: "🎟️",
            lessons: [
                {
                    type: "info", title: "Ficha Técnica: Versiones Premium",
                    dialogue: "En esta isla aprendemos sobre el 'Boleto de Reembolso'. Aplica para Bienestar y Respaldo.",
                    content: [
                        { tag: "DEVOLUCIÓN", text: "A la supervivencia del plazo, devuelve el <b>100% de aportaciones</b> de la cobertura básica." },
                        { tag: "FONDO PERDIDO", text: "Lo pagado por coberturas extra (salud, invalidez) <b>NO se devuelve</b>." },
                        { tag: "BONO INVALIDEZ", text: "Si hay Invalidez Total: (1) Cobra, (2) <b>Póliza se Salda</b>, (3) Al final <b>igual le devuelven el ahorro</b>." }
                    ]
                },
                {
                    type: "quiz", question: "Si un cliente sobrevive, ¿Prudential le devuelve el dinero que pagó por 'Cirugías y Hospital'?",
                    options: [
                        { text: "Sí, se devuelve el 100% de toda la póliza.", hint: "Revisa la regla de 'Fondo Perdido'. Los extras de riesgo se consumen." },
                        { text: "No, las primas de coberturas adicionales NO se devuelven.", correct: true }
                    ],
                    feedback: "Correcto. Solo se devuelve lo aportado a la cobertura básica de fallecimiento."
                },
                {
                    type: "quiz", question: "Si el cliente sufre Invalidez Total en el año 8 de un Bienestar Premium a 15 años:",
                    options: [
                        { text: "Cobra la invalidez, no paga los últimos 7 años (se salda), y al año 15 le devuelven su ahorro.", correct: true },
                        { text: "Cobra la invalidez pero pierde derecho a la devolución de supervivencia.", hint: "El plan Premium tiene un beneficio específico que protege la supervivencia en este escenario." }
                    ],
                    feedback: "¡Excelente! Es el beneficio más robusto: Cobra, se Salda y Recupera."
                },
                {
                    type: "summary", title: "Lo que debes recordar",
                    bullets: [
                        "Devuelve 100% de prima básica a la supervivencia.",
                        "Coberturas adicionales son fondo perdido.",
                        "Bono de Invalidez: Cobra, Póliza Saldada y Recupera ahorro al final."
                    ]
                }
            ]
        },
        {
            id: "i4", title: "Isla Vitalicia", subtitle: "Vida y Valor de Rescate", color: "bg-[#fbbf24]", icon: "🏠",
            lessons: [
                {
                    type: "info", title: "Ficha Técnica: Vida Prudential",
                    dialogue: "Llegamos a la Isla Mayor. Aquí el seguro dura para siempre y genera 'Valor de Rescate'.",
                    content: [
                        { tag: "VIGENCIA", text: "Protección garantizada hasta los <b>101 años</b> de edad." },
                        { tag: "ESTRATEGIA", text: "Mínimo sistema: 70k. Estrategia: <b>Cotizar piso de 75,000 UDIS</b> para poder hacer reducciones en crisis sin cancelar." },
                        { tag: "RESCATE", text: "Años 1 y 2 el valor de rescate es <b>CERO (Leyes Antilavado)</b>. A partir del año 3 crece." },
                        { tag: "MUERTE TÉCNICA", text: "Llegar vivo a los 100 años dispara el pago del 100% de la suma asegurada en vida." }
                    ]
                },
                {
                    type: "quiz", question: "¿Por qué el Valor de Rescate es CERO absoluto durante los años 1 y 2 de la póliza?",
                    options: [
                        { text: "Para pagar comisiones.", hint: "Esa no es la razón legal estricta frente al cliente." },
                        { text: "Por regulaciones de la Ley de Prevención de Lavado de Dinero.", correct: true }
                    ],
                    feedback: "Correcto. Evita que la póliza se use como instrumento puente de blanqueo a corto plazo."
                },
                {
                    type: "quiz", question: "¿Por qué como asesor debes configurar la propuesta 'Vida' en 75,000 UDIS y no en el mínimo de 70,000?",
                    options: [
                        { text: "Porque 75k permite bajar la suma a 70k en el futuro si el cliente tiene crisis económica, salvando la póliza.", correct: true },
                        { text: "Porque en 70k no pagan bono comercial.", hint: "Tiene que ver con salvaguardar la póliza (darle margen de reducción) si el cliente ya no puede pagar igual." }
                    ],
                    feedback: "Exacto. Te da 5,000 UDIS de maniobra de rescate."
                },
                {
                    type: "summary", title: "Lo que debes recordar",
                    bullets: [
                        "Protege hasta los 101 años.",
                        "Valor de Rescate: Años 1 y 2 = CERO.",
                        "Vender siempre con piso de 75k UDIS.",
                        "Muerte Técnica: Cobras el 100% si vives a los 100."
                    ]
                }
            ]
        },
        {
            id: "i5", title: "Isla Universitaria", subtitle: "Garantía Prudential", color: "bg-[#2dd4bf]", icon: "🎓",
            lessons: [
                {
                    type: "info", title: "Ficha Técnica: Garantía",
                    dialogue: "Navegamos a las costas de la Educación. Un plan temporal con fecha de entrega exacta.",
                    content: [
                        { tag: "PLAZOS", text: "Libres de <b>10 a 30 años</b> (Ej. plazos de 11, 13, 17 años). Edad alcanzada 60 o 65." },
                        { tag: "ENTREGA", text: "A la supervivencia, el dinero se le entrega al <b>CONTRATANTE</b> (papá), NO al niño." },
                        { tag: "SUMA MÍNIMA", text: "<b>50,000 UDIS</b> (Plan Básico). Si se cuelga como complementario: 13,750 UDIS." },
                        { tag: "JUGADA MÚLTIPLE", text: "Puedes meter <b>hasta 5 garantías</b> en una sola póliza (Ej. 17, 18, 19 y 20 años) para pagar la universidad anualmente." }
                    ]
                },
                {
                    type: "quiz", question: "En un plan Garantía a 18 años, cuando se cumple el plazo, ¿A quién le hace el cheque la aseguradora?",
                    options: [
                        { text: "Al hijo (Asegurado) para su universidad.", hint: "Un joven de 18 años podría malgastar el dinero. Legalmente va a otra persona." },
                        { text: "Al padre/madre (Contratante).", correct: true }
                    ],
                    feedback: "Correcto. El contratante decide cómo administra el dinero de la educación."
                },
                {
                    type: "quiz", question: "Para la 'Jugada Múltiple' universitaria, si cotizo plazos a 17, 18, 19 y 20 años en una misma póliza, ¿Cuál debe ser la cobertura BÁSICA?",
                    options: [
                        { text: "Cualquiera, no importa el orden.", hint: "La cobertura básica debe 'cobijar' a todas las complementarias." },
                        { text: "El de mayor duración (20 años).", correct: true }
                    ],
                    feedback: "Exacto. El plan base debe ser el más lejano, y los demás se cuelgan como complementarios."
                },
                {
                    type: "summary", title: "Lo que debes recordar",
                    bullets: [
                        "Paga al CONTRATANTE, no al asegurado.",
                        "Plazos exactos a medida (11, 12, 17 años).",
                        "Suma mínima 50,000 UDIS.",
                        "Jugada maestra: Meter hasta 5 entregas en una póliza."
                    ]
                }
            ]
        },
        {
            id: "i6", title: "Isla del Retiro", subtitle: "PPR vs Retiro Plus", color: "bg-[#10b981]", icon: "⛺",
            lessons: [
                {
                    type: "info", title: "Ficha Técnica: Planes de Retiro",
                    dialogue: "Última isla técnica de productos. Cuidado con las leyes fiscales aquí.",
                    content: [
                        { tag: "DEDUCCIÓN PPR", text: "Art. 151. Tope máximo a deducir: <b>10% de ingresos anuales o 5 UMAs</b> (lo menor)." },
                        { tag: "PPR TRADICIONAL", text: "Llegando a los 65 años, cobras tu retiro y <b>la protección por fallecimiento TERMINA</b>." },
                        { tag: "RETIRO PLUS", text: "Base Vida 100. A los 65 cobras tu retiro <b>y SIGUES protegido hasta los 100 años</b>." },
                        { tag: "EXCLUSIÓN FISCAL", text: "El costo que pagas por la cobertura de Invalidez <b>NO es deducible de impuestos</b>, solo la aportación al retiro." }
                    ]
                },
                {
                    type: "quiz", question: "Según el Artículo 151, ¿Cuál es el tope matemático exacto para deducir el PPR?",
                    options: [
                        { text: "10% de los ingresos anuales o 5 UMAs (lo que resulte menor).", correct: true },
                        { text: "20% de los ingresos del año anterior.", hint: "Revisa bien los porcentajes en la ficha técnica." },
                        { text: "El total de la prima anual pagada.", hint: "El SAT impone un límite estricto de deducción personal." }
                    ],
                    feedback: "Correcto. Ese es el marco legal inquebrantable del PPR."
                },
                {
                    type: "quiz", question: "¿Cuál es la principal diferencia estructural entre el PPR Tradicional y el Retiro Plus?",
                    options: [
                        { text: "El PPR es deducible y el Plus no.", hint: "Ambos pueden estructurarse fiscalmente. Piensa en qué pasa DESPUÉS de cumplir 65 años." },
                        { text: "En el PPR la protección termina al retirarte; en el Plus sigues protegido hasta los 100.", correct: true }
                    ],
                    feedback: "Exacto. El Retiro Plus elimina el riesgo de desprotección en la vejez."
                },
                {
                    type: "summary", title: "Lo que debes recordar",
                    bullets: [
                        "Tope PPR: 10% de ingresos o 5 UMAs.",
                        "Costo de invalidez NO es deducible.",
                        "PPR: Protección acaba a los 65.",
                        "Retiro Plus: Cobras a los 65 y sigues protegido hasta 100."
                    ]
                }
            ]
        }
    ];

    let state = {
        unlockedIslands: 0,
        currentIsland: 0,
        currentStep: 0,
        xp: 0,
        selectedOption: null,
        isChecking: false,
        hasFailedCurrent: false
    };

    const dom = {
        screenMap: document.getElementById('screen-map'),
        screenLesson: document.getElementById('screen-lesson'),
        screenCompletion: document.getElementById('screen-completion'),
        nodesContainer: document.getElementById('nodes-container'),
        pathBg: document.getElementById('path-bg'),
        xpCounter: document.getElementById('xp-counter'),
        
        lessonContent: document.getElementById('lesson-content'),
        lessonProgress: document.getElementById('lesson-progress'),
        lessonCurrentStep: document.getElementById('lesson-current-step'),
        lessonTotalSteps: document.getElementById('lesson-total-steps'),
        
        lessonFooter: document.getElementById('lesson-footer'),
        lessonFeedback: document.getElementById('lesson-feedback'),
        feedbackIcon: document.getElementById('feedback-icon'),
        feedbackTitle: document.getElementById('feedback-title'),
        feedbackText: document.getElementById('feedback-text'),
        lessonBtn: document.getElementById('lesson-btn'),
        
        modal: document.getElementById('custom-modal'),
        modalContent: document.querySelector('.modal-content'),
        modalTitle: document.getElementById('modal-title'),
        modalDesc: document.getElementById('modal-desc')
    };

    function initApp() {
        renderMap();
    }

    function renderMap() {
        dom.screenMap.classList.remove('hidden');
        dom.screenLesson.classList.replace('flex', 'hidden');
        dom.screenCompletion.classList.replace('flex', 'hidden');

        let html = '';
        
        islands.forEach((island, index) => {
            const isUnlocked = index <= state.unlockedIslands;
            const isCurrent = index === state.unlockedIslands;
            
            // Layout en zigzag
            let alignClass = index % 2 === 0 ? "self-start ml-8" : "self-end mr-8";
            
            let btnClass = `island-node ${isUnlocked ? island.color : 'locked'} ${isUnlocked ? 'cursor-pointer hover:scale-105' : 'cursor-not-allowed'}`;
            if(isCurrent) btnClass += " ring-4 ring-white ring-offset-4 ring-offset-[#0284c7] float";

            html += `
                <div class="relative flex flex-col w-full z-10 ${alignClass}" style="max-width: 140px;">
                    <button ${isUnlocked ? `onclick="startIsland(${index})"` : 'disabled'} class="${btnClass}">
                        <span class="text-4xl shadow-sm drop-shadow-md">${island.icon}</span>
                        ${index < state.unlockedIslands ? `<div class="absolute -top-2 -right-2 bg-yellow-400 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm border-2 border-white font-black shadow-md">★</div>` : ''}
                    </button>
                    <div class="mt-3 text-center bg-white/95 backdrop-blur-sm px-3 py-2 rounded-xl shadow-lg border border-white/50 w-full relative">
                        <div class="absolute -top-2 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-4 border-r-4 border-b-4 border-transparent border-b-white"></div>
                        <span class="block font-black text-[#0f172a] text-[13px] leading-tight">${island.title}</span>
                        <span class="block font-bold text-slate-500 text-[9px] mt-0.5 uppercase tracking-wide">${island.subtitle}</span>
                    </div>
                </div>
            `;
        });

        dom.nodesContainer.innerHTML = html;
        
        setTimeout(() => {
            if(dom.nodesContainer.offsetHeight > 0) {
                dom.pathBg.style.height = `${dom.nodesContainer.offsetHeight - 50}px`;
            }
        }, 100);
    }

    window.startIsland = function(index) {
        state.currentIsland = index;
        state.currentStep = 0;
        
        dom.screenMap.classList.add('hidden');
        dom.screenLesson.classList.replace('hidden', 'flex');
        
        dom.lessonTotalSteps.innerText = islands[state.currentIsland].lessons.length;
        renderLessonStep();
    };

    function renderLessonStep() {
        const lesson = islands[state.currentIsland].lessons[state.currentStep];
        
        state.selectedOption = null;
        state.isChecking = false;
        state.hasFailedCurrent = false;
        
        dom.lessonCurrentStep.innerText = state.currentStep + 1;
        dom.lessonProgress.style.width = `${(state.currentStep / islands[state.currentIsland].lessons.length) * 100}%`;

        dom.lessonFooter.className = 'absolute bottom-0 w-full p-4 bg-white border-t border-slate-200 z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]';
        dom.lessonFeedback.classList.add('hidden');
        
        let html = '';

        if (lesson.type === 'info') {
            dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-[#0ea5e9] border-[#0284c7] text-white tracking-wide shadow-md hover:bg-[#38bdf8]';
            dom.lessonBtn.innerText = 'MEMORIZADO. CONTINUAR';
            dom.lessonBtn.disabled = false;

            html += `
                <div class="fade-in max-w-md mx-auto">
                    <h2 class="font-black text-2xl text-slate-800 mb-2">${lesson.title}</h2>
                    <p class="text-sm font-medium text-slate-500 mb-6">${lesson.dialogue}</p>
                    <div class="space-y-3">
            `;

            lesson.content.forEach(item => {
                html += `
                    <div class="bg-white border border-slate-200 border-l-4 border-l-[#0ea5e9] rounded-xl p-4 shadow-sm">
                        <div class="tech-pill">${item.tag}</div>
                        <p class="text-[14px] text-slate-700 font-medium leading-relaxed mt-1">${item.text}</p>
                    </div>
                `;
            });
            html += `</div></div>`;

        } else if (lesson.type === 'quiz') {
            dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-slate-200 text-slate-400 border-slate-300 tracking-wide';
            dom.lessonBtn.innerText = 'COMPROBAR';
            dom.lessonBtn.disabled = true;

            html += `
                <div class="fade-in max-w-md mx-auto mt-2">
                    <p class="text-xs font-black text-[#0ea5e9] uppercase tracking-widest mb-2">Prueba de Conocimiento</p>
                    <h2 class="text-xl font-black text-slate-800 mb-8 leading-snug">${lesson.question}</h2>
                    <div class="space-y-3" id="options-container">
            `;

            lesson.options.forEach((opt, index) => {
                html += `
                    <div onclick="selectOption(${index})" class="quiz-opt p-4 flex items-center gap-4" id="opt-${index}">
                        <div class="w-6 h-6 shrink-0 rounded-full border-2 border-slate-300 flex items-center justify-center font-bold text-transparent check-mark text-[12px] transition-colors">✓</div>
                        <span class="font-bold text-slate-700 text-[15px] flex-1 leading-snug">${opt.text}</span>
                    </div>
                `;
            });
            html += `</div></div>`;
        } else if (lesson.type === 'summary') {
            dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-emerald-500 border-emerald-600 text-white tracking-wide shadow-md hover:bg-emerald-400';
            dom.lessonBtn.innerText = 'TERMINAR ISLA';
            dom.lessonBtn.disabled = false;

            html += `
                <div class="fade-in max-w-md mx-auto bg-slate-800 rounded-3xl p-6 text-white shadow-2xl relative overflow-hidden mt-4 border-4 border-slate-700">
                    <div class="absolute -right-4 -top-4 text-7xl opacity-10">📋</div>
                    <h2 class="font-black text-2xl text-emerald-400 mb-6 relative z-10">${lesson.title}</h2>
                    <ul class="space-y-4 relative z-10">
            `;
            
            lesson.bullets.forEach(bullet => {
                html += `
                    <li class="flex items-start gap-3">
                        <span class="text-emerald-400 font-bold mt-0.5">→</span>
                        <span class="font-medium text-slate-200 text-[15px] leading-snug">${bullet}</span>
                    </li>
                `;
            });
            html += `</ul></div>`;
        }

        dom.lessonContent.innerHTML = html;
        dom.lessonContent.scrollTo(0,0);
    }

    window.selectOption = function(index) {
        if (state.isChecking && !state.hasFailedCurrent) return; 
        
        if (state.isChecking && state.hasFailedCurrent) {
            state.isChecking = false;
            dom.lessonFooter.className = 'absolute bottom-0 w-full p-4 bg-white border-t border-slate-200 z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]';
            dom.lessonFeedback.classList.add('hidden');
        }

        const selectedEl = document.getElementById(`opt-${index}`);
        if(selectedEl.classList.contains('disabled')) return; 

        state.selectedOption = index;
        
        const opts = document.querySelectorAll('.quiz-opt:not(.disabled)');
        opts.forEach((el) => {
            el.classList.remove('selected');
            const check = el.querySelector('.check-mark');
            check.classList.remove('bg-[#0ea5e9]', 'border-[#0ea5e9]', 'text-white');
            check.classList.add('text-transparent', 'border-slate-300');
        });

        selectedEl.classList.add('selected');
        const check = selectedEl.querySelector('.check-mark');
        check.classList.replace('text-transparent', 'text-white');
        check.classList.replace('border-slate-300', 'border-[#0ea5e9]');
        check.classList.add('bg-[#0ea5e9]');

        dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-[#0ea5e9] border-[#0284c7] text-white tracking-wide shadow-md hover:bg-[#38bdf8]';
        dom.lessonBtn.innerText = 'COMPROBAR';
        dom.lessonBtn.disabled = false;
    };

    window.handleLessonAction = function() {
        const lesson = islands[state.currentIsland].lessons[state.currentStep];

        if (lesson.type === 'info' || lesson.type === 'summary') {
            nextStep();
        } else if (lesson.type === 'quiz') {
            if (!state.isChecking) {
                checkAnswer(lesson);
            } else if (!state.hasFailedCurrent) {
                nextStep();
            }
        }
    };

    function checkAnswer(lesson) {
        const isCorrect = lesson.options[state.selectedOption].correct;
        state.isChecking = true;

        dom.lessonFeedback.classList.remove('hidden');

        if (isCorrect) {
            state.hasFailedCurrent = false;
            dom.lessonFooter.className = 'absolute bottom-0 w-full p-4 bg-[#dcfce7] border-t border-[#bbf7d0] z-30';
            dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-emerald-500 border-emerald-600 text-white tracking-wide shadow-md hover:bg-emerald-400';
            dom.lessonBtn.innerText = 'CONTINUAR';
            
            dom.feedbackIcon.innerHTML = '✓';
            dom.feedbackIcon.className = 'w-10 h-10 rounded-full flex items-center justify-center font-black text-2xl bg-white text-emerald-500 shrink-0 shadow-sm';
            dom.feedbackTitle.innerText = '¡Técnicamente Correcto!';
            dom.feedbackTitle.className = 'font-black text-xl text-emerald-700';
            dom.feedbackText.innerHTML = lesson.feedback;
            dom.feedbackText.className = 'text-[15px] font-bold text-emerald-800 opacity-90 mt-1 leading-snug';

            const selectedOptEl = document.getElementById(`opt-${state.selectedOption}`);
            selectedOptEl.classList.remove('selected');
            selectedOptEl.classList.add('correct');
            
            state.xp += 10;
            dom.xpCounter.innerText = state.xp;

        } else {
            state.hasFailedCurrent = true;
            dom.lessonFooter.className = 'absolute bottom-0 w-full p-4 bg-[#fee2e2] border-t border-[#fecaca] z-30';
            dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-rose-500 border-rose-600 text-white tracking-wide shadow-md hover:bg-rose-400';
            dom.lessonBtn.innerText = 'ENTENDIDO (REINTENTAR)';
            
            dom.feedbackIcon.innerHTML = '✕';
            dom.feedbackIcon.className = 'w-10 h-10 rounded-full flex items-center justify-center font-black text-2xl bg-white text-rose-500 shrink-0 shadow-sm';
            dom.feedbackTitle.innerText = 'Revisión Normativa';
            dom.feedbackTitle.className = 'font-black text-xl text-rose-700';
            dom.feedbackText.innerHTML = lesson.options[state.selectedOption].hint;
            dom.feedbackText.className = 'text-[15px] font-bold text-rose-800 opacity-90 mt-1 leading-snug';

            const selectedOptEl = document.getElementById(`opt-${state.selectedOption}`);
            selectedOptEl.classList.add('shake', 'disabled');
            selectedOptEl.classList.remove('selected');
            setTimeout(() => selectedOptEl.classList.remove('shake'), 400);
            
            const check = selectedOptEl.querySelector('.check-mark');
            check.classList.remove('bg-[#0ea5e9]', 'border-[#0ea5e9]', 'text-white');
            check.innerHTML = '✕';
            check.classList.add('text-slate-400', 'border-slate-300', 'bg-slate-100');

            dom.lessonBtn.onclick = () => {
                state.isChecking = false;
                state.selectedOption = null;
                dom.lessonFooter.className = 'absolute bottom-0 w-full p-4 bg-white border-t border-slate-200 z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]';
                dom.lessonFeedback.classList.add('hidden');
                dom.lessonBtn.className = 'w-full py-4 rounded-xl font-black text-[16px] btn-3d bg-slate-200 text-slate-400 border-slate-300 tracking-wide';
                dom.lessonBtn.innerText = 'COMPROBAR';
                dom.lessonBtn.disabled = true;
                dom.lessonBtn.onclick = handleLessonAction; 
            };
        }
    }

    function nextStep() {
        state.currentStep++;
        if (state.currentStep >= islands[state.currentIsland].lessons.length) {
            dom.lessonProgress.style.width = '100%';
            dom.lessonCurrentStep.innerText = islands[state.currentIsland].lessons.length;
            showCompletionScreen();
        } else {
            renderLessonStep();
        }
    }

    function showCompletionScreen() {
        dom.screenLesson.classList.replace('flex', 'hidden');
        dom.screenCompletion.classList.replace('hidden', 'flex');
        document.getElementById('completion-text').innerText = `Has dominado las reglas técnicas de: ${islands[state.currentIsland].title}`;
    }

    window.finishLesson = function() {
        if (state.currentIsland === state.unlockedIslands && state.unlockedIslands < islands.length - 1) {
            state.unlockedIslands++;
        }
        renderMap();
    };

    window.exitLesson = function() {
        showModal('¿Abandonar Isla?', 'Tu progreso en esta isla no se guardará.', () => {
            renderMap();
            closeModal();
        });
    };
    
    window.showModal = function(title, desc, confirmCallback = closeModal) {
        dom.modalTitle.innerText = title;
        dom.modalDesc.innerText = desc;
        dom.modal.classList.remove('hidden');
        // Force reflow for animation
        void dom.modal.offsetWidth; 
        dom.modal.classList.remove('opacity-0', 'pointer-events-none');
        dom.modalContent.classList.remove('scale-95');
        dom.modalContent.classList.add('scale-100');
        
        const btn = dom.modal.querySelector('button');
        btn.onclick = confirmCallback;
    };
    
    window.closeModal = function() {
        dom.modal.classList.add('opacity-0', 'pointer-events-none');
        dom.modalContent.classList.remove('scale-100');
        dom.modalContent.classList.add('scale-95');
        setTimeout(() => {
            dom.modal.classList.add('hidden');
        }, 200);
    };

    initApp();

</script>
</body>
</html>
